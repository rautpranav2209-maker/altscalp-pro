<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — AltScalp PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #07090e;
      color: #dce6f5;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .wrap { padding: 40px 20px; }
    .code {
      font-family: 'Syne', sans-serif;
      font-size: clamp(80px, 20vw, 160px);
      font-weight: 800;
      color: #00e5a0;
      line-height: 1;
      letter-spacing: -4px;
      opacity: 0.15;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      margin: -20px 0 12px;
    }
    p { color: #8496b0; font-size: 13px; margin-bottom: 32px; line-height: 1.7; }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: rgba(0,229,160,0.12);
      border: 1px solid rgba(0,229,160,0.3);
      color: #00e5a0;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    a:hover { background: rgba(0,229,160,0.22); transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist.<br>Head back to the trading terminal.</p>
    <a href="/">⚡ Back to AltScalp PRO</a>
  </div>
</body>
</html>
